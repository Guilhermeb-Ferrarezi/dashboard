name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  lint-web:
    name: Lint (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: cd web && bun install --frozen-lockfile
      - run: cd web && bun run lint

  test-api:
    name: Test (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: cd api && bun install --frozen-lockfile
      - run: cd api && bun test

  build-api:
    name: Build (API)
    runs-on: ubuntu-latest
    needs: [test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: cd api && bun install --frozen-lockfile
      - run: cd api && bun build src/server.ts --outdir dist --target bun

  build-web:
    name: Build (Web)
    runs-on: ubuntu-latest
    needs: [lint-web]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'
      - run: cd web && bun install --frozen-lockfile
      - name: Create minimal env for build
        run: |
          echo "NEXT_PUBLIC_API_URL=http://localhost:4000/api" > web/.env
          echo "API_INTERNAL_URL=http://localhost:4000/api" >> web/.env
      - run: cd web && bun run build
