openapi: 3.0.3
info:
  title: Santos Tech Home API
  version: 1.0.0
  description: >
    Contrato HTTP completo para o agente Codex operar o Santos Tech Home.
    Todas as rotas montadas em api/src/server.ts e api/src/routes estão
    documentadas aqui. O agente deve validar path, método, payload e risco
    por esta especificação antes de executar chamadas internas.
servers:
  - url: http://127.0.0.1:4000/api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
    ToolId:
      name: toolId
      in: path
      required: true
      schema:
        type: string
    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
    TeamNumber:
      name: numero
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ModalidadeQuery:
      name: modalidade
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Modalidade"
    ProjectIdQuery:
      name: projectId
      in: query
      required: true
      schema:
        type: string
    SearchQuery:
      name: search
      in: query
      required: false
      schema:
        type: string
    MethodQuery:
      name: method
      in: query
      required: false
      schema:
        type: string
        enum: [GET, POST, PUT, PATCH, DELETE, SYSTEM]
    FromQuery:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date
    ToQuery:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
  schemas:
    Modalidade:
      type: string
      enum: [valorant, counter-strike, lol]
    OkResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        message:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        message:
          type: string
    UserRole:
      type: string
      enum: [user, admin]
    ThemeMode:
      type: string
      enum: [light, dark, system]
    ThemePreferences:
      type: object
      additionalProperties: true
      properties:
        theme:
          $ref: "#/components/schemas/ThemeMode"
        mode:
          $ref: "#/components/schemas/ThemeMode"
        accentColor:
          type: string
        radius:
          type: string
        density:
          type: string
    User:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        preferences:
          $ref: "#/components/schemas/ThemePreferences"
        createdAt:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [password]
      properties:
        identifier:
          type: string
        username:
          type: string
        email:
          type: string
        password:
          type: string
    CreateUserRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
    UpdateProfileRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
        email:
          type: string
    UpdatePreferencesRequest:
      type: object
      additionalProperties: true
      properties:
        preferences:
          $ref: "#/components/schemas/ThemePreferences"
        theme:
          $ref: "#/components/schemas/ThemeMode"
    AdminAccessTokenSummary:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
        revokedAt:
          type: string
          nullable: true
        lastUsedAt:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
    CreateAdminTokenRequest:
      type: object
      required: [type, label]
      properties:
        type:
          type: string
          enum: [codex]
        label:
          type: string
    Project:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        url:
          type: string
        category:
          type: string
        audience:
          type: string
        tags:
          type: array
          items:
            type: string
        icon:
          type: string
        status:
          type: string
        ssoMode:
          type: string
        featured:
          type: boolean
    LogProject:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        apiKey:
          type: string
        collectionName:
          type: string
        totalLogs:
          type: integer
    CreateLogProjectRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
    LogEntry:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        status:
          type: integer
        method:
          type: string
        endpoint:
          type: string
        url:
          type: string
        ip:
          type: string
        durationMs:
          type: integer
        createdAt:
          type: string
        requestPayload:
          nullable: true
        responsePayload:
          nullable: true
    CodexAccountStatus:
      type: object
      additionalProperties: true
      properties:
        connected:
          type: boolean
        authMode:
          type: string
          nullable: true
        requiresOpenaiAuth:
          type: boolean
        planType:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        sharedAccountLabel:
          type: string
          nullable: true
        codexAccessTokenActive:
          type: boolean
        codexAccessTokenRequired:
          type: boolean
        codexAccessBlockedReason:
          type: string
          nullable: true
    CodexThreadSummary:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        title:
          type: string
        preview:
          type: string
        updatedAt:
          type: integer
        createdAt:
          type: integer
        status:
          type: string
        lastOpenedAt:
          type: string
          nullable: true
    CodexRuntimeTool:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        label:
          type: string
        description:
          type: string
        kind:
          type: string
        requiresConfirmation:
          type: boolean
    RunCodexToolRequest:
      type: object
      properties:
        params:
          type: object
          additionalProperties: true
        confirmed:
          type: boolean
    SsoStartResponse:
      type: object
      additionalProperties: true
      properties:
        code:
          type: string
        expiresIn:
          type: integer
        redirectUrl:
          type: string
    SsoExchangeRequest:
      type: object
      required: [projectId, code]
      properties:
        projectId:
          type: string
        code:
          type: string
    RiotLookupRequest:
      type: object
      required: [riotId]
      properties:
        riotId:
          type: string
          example: Jogador#BR1
    VctInscricaoPayload:
      type: object
      additionalProperties: true
      required:
        - nome
        - nick
        - email
        - whatsapp
        - elo
        - pico
        - funcaoPrimaria
        - funcaoSecundaria
      properties:
        modalidade:
          $ref: "#/components/schemas/Modalidade"
        nome:
          type: string
        nick:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        instagram:
          type: string
        cidade:
          type: string
        elo:
          type: string
        pico:
          type: string
        funcaoPrimaria:
          type: string
        funcaoSecundaria:
          type: string
        status:
          type: string
          enum: [active, inactive]
        time:
          type: integer
          nullable: true
        tags:
          type: array
          items:
            type: string
        observacoes:
          type: string
        highlightColor:
          type: string
    VctInscricao:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        modalidade:
          $ref: "#/components/schemas/Modalidade"
        nome:
          type: string
        nick:
          type: string
        email:
          type: string
        elo:
          type: string
        pico:
          type: string
        status:
          type: string
        time:
          type: integer
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
    VctTime:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        modalidade:
          $ref: "#/components/schemas/Modalidade"
        numero:
          type: integer
        nome:
          type: string
    VctFormationFilters:
      type: object
      additionalProperties: true
      properties:
        sameTrainingDays:
          type: boolean
        sameAvailability:
          type: boolean
    VctFormacaoPayload:
      type: object
      additionalProperties: true
      properties:
        modalidade:
          $ref: "#/components/schemas/Modalidade"
        payload:
          type: string
          description: JSON string com time, capitao e jogadores. Usado em multipart/form-data.
        logo:
          type: string
          format: binary
    VctFormacao:
      type: object
      additionalProperties: true
      properties:
        _id:
          type: string
        modalidade:
          $ref: "#/components/schemas/Modalidade"
        nome:
          type: string
        tag:
          type: string
        logoKey:
          type: string
        logoUrl:
          type: string
        membroCount:
          type: integer
        membros:
          type: array
          items:
            type: object
            additionalProperties: true
  responses:
    Unauthorized:
      description: Token ausente ou inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Permissão insuficiente
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Payload inválido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
paths:
  /:
    get:
      x-codex-risk: low
      summary: Health check do backend
      responses:
        "200":
          description: Backend ativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
  /auth/login:
    post:
      x-codex-risk: low
      summary: Realiza login e grava cookie auth_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado
  /auth/logout:
    post:
      x-codex-risk: low
      summary: Remove o cookie auth_token
      responses:
        "200":
          description: Logout realizado
  /auth/register:
    post:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Cria usuário e credencial de acesso.
      summary: Cria usuário pelo fluxo legado de auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Usuário criado
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /user/me:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lê o usuário autenticado
      responses:
        "200":
          description: Usuário atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
  /user/profile:
    put:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Altera nome ou email da conta autenticada.
      summary: Atualiza perfil do usuário autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Perfil atualizado
  /user/preferences:
    put:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Atualiza preferências visuais e tema do usuário autenticado
      description: Operação de baixo risco; pode ser usada para mudar tema sem confirmação extra.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesRequest"
      responses:
        "200":
          description: Preferências atualizadas
  /user:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Área do usuário autenticado
      responses:
        "200":
          description: Usuário autorizado
  /admin:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Área administrativa
      responses:
        "200":
          description: Admin autorizado
  /admin/users:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista usuários do portal
      responses:
        "200":
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
    post:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Cria uma nova conta no portal.
      summary: Cria usuário pelo painel admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Usuário criado
  /admin/tokens:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista tokens administrativos
      responses:
        "200":
          description: Lista de tokens
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminAccessTokenSummary"
    post:
      security:
        - bearerAuth: []
      x-codex-risk: high
      x-codex-risk-reasons:
        - Cria credencial administrativa reutilizável.
        - O token plaintext só é exibido uma vez.
      summary: Cria token administrativo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminTokenRequest"
      responses:
        "201":
          description: Token criado
  /admin/tokens/{tokenId}/revoke:
    post:
      security:
        - bearerAuth: []
      x-codex-risk: high
      x-codex-risk-reasons:
        - Revoga uma credencial administrativa.
      summary: Revoga token administrativo
      parameters:
        - $ref: "#/components/parameters/TokenId"
      responses:
        "200":
          description: Token revogado
  /projects:
    get:
      x-codex-risk: low
      summary: Lista projetos do portal
      responses:
        "200":
          description: Projetos disponíveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
  /logs/projects:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista projetos/collections de logs
      responses:
        "200":
          description: Projetos de logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogProject"
    post:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Cria collection e API key para um novo projeto de logs.
      summary: Cria projeto de logs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLogProjectRequest"
      responses:
        "201":
          description: Projeto de logs criado
  /logs:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista logs de uma collection
      parameters:
        - $ref: "#/components/parameters/ProjectIdQuery"
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/MethodQuery"
        - $ref: "#/components/parameters/FromQuery"
        - $ref: "#/components/parameters/ToQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Logs paginados
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogEntry"
                  page:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
  /sso/{projectId}/start:
    post:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Inicia SSO shared-ticket para um projeto
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Código SSO criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SsoStartResponse"
  /sso/exchange:
    post:
      x-codex-risk: low
      summary: Troca código SSO por usuário usando x-sso-shared-secret
      parameters:
        - name: x-sso-shared-secret
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SsoExchangeRequest"
      responses:
        "200":
          description: Usuário do SSO
  /valorant-account/lookup:
    post:
      x-codex-risk: low
      summary: Consulta Riot ID via proxy externo público
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiotLookupRequest"
      responses:
        "200":
          description: Dados da conta Valorant
  /codex/account:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lê status da conta Codex
      responses:
        "200":
          description: Status Codex
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  account:
                    $ref: "#/components/schemas/CodexAccountStatus"
  /codex/account/logout:
    post:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Desconecta a conta Codex ativa.
      summary: Desconecta conta Codex
      responses:
        "200":
          description: Conta desconectada
  /codex/tools:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista ferramentas runtime do Codex
      responses:
        "200":
          description: Ferramentas disponíveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  tools:
                    type: array
                    items:
                      $ref: "#/components/schemas/CodexRuntimeTool"
  /codex/tools/{toolId}/run:
    post:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Executa ferramenta operacional do Codex; a própria ferramenta pode exigir confirmação adicional.
      summary: Executa ferramenta runtime do Codex
      parameters:
        - $ref: "#/components/parameters/ToolId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCodexToolRequest"
      responses:
        "200":
          description: Resultado da ferramenta
  /codex/threads:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista threads Codex
      responses:
        "200":
          description: Threads Codex
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  threads:
                    type: array
                    items:
                      $ref: "#/components/schemas/CodexThreadSummary"
  /codex/threads/{threadId}:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lê timeline de uma thread Codex
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          description: Detalhe da thread
  /vct/inscricao:
    post:
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Cria inscrição pública em campeonato.
      summary: Cria inscrição VCT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VctInscricaoPayload"
      responses:
        "201":
          description: Inscrição criada
  /vct/inscricoes:
    get:
      security:
        - bearerAuth: []
      x-codex-risk: low
      summary: Lista inscrições VCT
      parameters:
        - $ref: "#/components/parameters/ModalidadeQuery"
      responses:
        "200":
          description: Inscrições
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  inscricoes:
                    type: array
                    items:
                      $ref: "#/components/schemas/VctInscricao"
  /vct/inscricao/{id}:
    put:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Altera dados pessoais e competitivos de uma inscrição.
      summary: Atualiza inscrição VCT
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VctInscricaoPayload"
      responses:
        "200":
          description: Inscrição atualizada
    delete:
      security:
        - bearerAuth: []
      x-codex-risk: high
      x-codex-risk-reasons:
        - Remove permanentemente uma inscrição.
      summary: Remove inscrição VCT
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Inscrição removida
  /vct/inscricao/{id}/status:
    patch:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
        - Ativa ou inativa inscrição; ao inativar remove time.
      summary: Atualiza status de uma inscrição
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        "200":
          description: Status atualizado
  /vct/inscricao/{id}/time:
    patch:
      security:
        - bearerAuth: []
      x-codex-risk: elevated
      x-codex-risk-reasons:
