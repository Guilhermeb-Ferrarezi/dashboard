services:
  mongo:
    image: mongo:7
    container_name: sga-painel-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: sga-painel-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sga-painel-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: https://painel-adm.santos-games.com
      ALLOWED_ORIGINS: https://painel-adm.santos-games.com,https://auth.santos-games.com
      COOKIE_DOMAIN: .santos-games.com
      AUTH_COOKIE_NAME: sga_auth
      MONGO_URI: mongodb://mongo:27017/sga-painel
      REDIS_URL: redis://redis:6379
      CODEX_HOME: /data/codex-home
      CODEX_WORKSPACE_ROOT: /app
      SITE_PUBLISHER_STORAGE_DIR: /app/site-routes
    volumes:
      - ./:/app
      - ./.codex-home:/data/codex-home
      - ./site-routes:/app/site-routes
    privileged: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:4000/api/health/sse').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sga-painel-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - ./web/.env
    environment:
      NEXT_PUBLIC_API_URL: https://painel-adm.santos-games.com/api
      API_INTERNAL_URL: http://api:4000/api
      NEXT_PUBLIC_AUTH_API_URL: https://auth.santos-games.com
      NEXT_PUBLIC_AUTH_CLIENT_ID: painel-adm
      NEXT_PUBLIC_AUTH_CALLBACK_URL: https://painel-adm.santos-games.com/auth/callback
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  site-router:
    image: nginx:1.27-alpine
    container_name: sga-painel-site-router
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:80"
    volumes:
      - ./site-routes:/srv/site-routes:ro
      - ./nginx/site-router.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mongo_data:
  redis_data:
